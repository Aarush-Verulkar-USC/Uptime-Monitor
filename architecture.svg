<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 570" width="900" height="570">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }
    </style>
    <marker id="a0" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="570" fill="#0d1117" rx="14"/>

  <!-- ═══════════════════════════════════════════════ CLIENT ══ -->
  <rect x="70" y="22" width="178" height="50" rx="8"
        fill="#1c2333" stroke="#374151" stroke-width="1.5"/>
  <text x="159" y="43" text-anchor="middle"
        fill="#e6edf3" font-size="12" font-weight="600">Browser / API</text>
  <text x="159" y="60" text-anchor="middle"
        fill="#6b7280" font-size="10">REST Client · :8080</text>

  <!-- Client → Router -->
  <line x1="159" y1="72" x2="159" y2="140"
        stroke="#6b7280" stroke-width="1.5" marker-end="url(#a0)"/>

  <!-- ═══════════════════════════════ GO HTTP SERVER BOX ══ -->
  <rect x="30" y="102" width="840" height="288" rx="10"
        fill="#161b22" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="52" y="123" fill="#60a5fa" font-size="11" font-weight="600">Go HTTP Server</text>
  <text x="198" y="123" fill="#374151" font-size="10">· single binary · two concurrent processes</text>

  <!-- ═════════════════════════════════ CHI ROUTER ══ -->
  <rect x="70" y="140" width="168" height="58" rx="8"
        fill="#0c1e35" stroke="#2563eb" stroke-width="1.5"/>
  <text x="154" y="163" text-anchor="middle"
        fill="#93c5fd" font-size="12" font-weight="600">chi Router</text>
  <text x="154" y="181" text-anchor="middle"
        fill="#3b5f8a" font-size="10">HTTP multiplexer</text>

  <!-- Router → Handler -->
  <line x1="238" y1="169" x2="278" y2="169"
        stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- ═══════════════════════════════ HANDLER LAYER ══ -->
  <rect x="278" y="140" width="168" height="58" rx="8"
        fill="#0c1e35" stroke="#2563eb" stroke-width="1.5"/>
  <text x="362" y="163" text-anchor="middle"
        fill="#93c5fd" font-size="12" font-weight="600">Handler Layer</text>
  <text x="362" y="181" text-anchor="middle"
        fill="#3b5f8a" font-size="10">API + dashboard pages</text>

  <!-- ════════════════════════════════ SCHEDULER BOX ══ -->
  <rect x="480" y="118" width="368" height="260" rx="8"
        fill="#160d2a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="502" y="140" fill="#a78bfa" font-size="11" font-weight="600">Scheduler</text>
  <text x="828" y="140" text-anchor="end"
        fill="#3d2d6b" font-size="10">goroutine-per-monitor pattern</text>

  <!-- Goroutine 1 -->
  <rect x="500" y="150" width="142" height="42" rx="6"
        fill="#1a0f3a" stroke="#5b21b6" stroke-width="1"/>
  <text x="571" y="168" text-anchor="middle"
        fill="#c4b5fd" font-size="11">Goroutine 1</text>
  <text x="571" y="183" text-anchor="middle"
        fill="#5b21b6" font-size="9">ticker · 30 s</text>

  <!-- Goroutine 2 -->
  <rect x="500" y="204" width="142" height="42" rx="6"
        fill="#1a0f3a" stroke="#5b21b6" stroke-width="1"/>
  <text x="571" y="222" text-anchor="middle"
        fill="#c4b5fd" font-size="11">Goroutine 2</text>
  <text x="571" y="237" text-anchor="middle"
        fill="#5b21b6" font-size="9">ticker · 30 s</text>

  <!-- dots -->
  <text x="571" y="266" text-anchor="middle"
        fill="#3d2d6b" font-size="22" letter-spacing="5">···</text>

  <!-- Goroutine N -->
  <rect x="500" y="278" width="142" height="42" rx="6"
        fill="#1a0f3a" stroke="#5b21b6" stroke-width="1"/>
  <text x="571" y="296" text-anchor="middle"
        fill="#c4b5fd" font-size="11">Goroutine N</text>
  <text x="571" y="311" text-anchor="middle"
        fill="#5b21b6" font-size="9">ticker · 30 s</text>

  <!-- ═════════════════════════════════ CHECKER ══ -->
  <rect x="672" y="196" width="156" height="70" rx="8"
        fill="#1a0f3a" stroke="#7c3aed" stroke-width="2"/>
  <text x="750" y="221" text-anchor="middle"
        fill="#c4b5fd" font-size="12" font-weight="600">Checker</text>
  <text x="750" y="239" text-anchor="middle"
        fill="#7c3aed" font-size="10">HTTP GET · measure RTT</text>
  <text x="750" y="256" text-anchor="middle"
        fill="#3d2d6b" font-size="9">per-request timeout</text>

  <!-- Goroutine → Checker arrows -->
  <path d="M 642 171 C 658 171 658 220 672 222"
        fill="none" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#ap)"/>
  <line x1="642" y1="225" x2="672" y2="231"
        stroke="#7c3aed" stroke-width="1.2" marker-end="url(#ap)"/>
  <path d="M 642 299 C 658 299 658 248 672 244"
        fill="none" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#ap)"/>

  <!-- ═══════════════════════════════ POSTGRESQL ══ -->
  <rect x="30" y="444" width="260" height="112" rx="8"
        fill="#071a10" stroke="#16a34a" stroke-width="1.5"/>
  <text x="160" y="470" text-anchor="middle"
        fill="#4ade80" font-size="13" font-weight="600">PostgreSQL 16</text>
  <text x="160" y="490" text-anchor="middle"
        fill="#86efac" font-size="11">monitors · checks · incidents</text>
  <text x="160" y="508" text-anchor="middle"
        fill="#2d6b46" font-size="10">PERCENTILE_CONT · FILTER agg</text>
  <text x="160" y="524" text-anchor="middle"
        fill="#1a3a26" font-size="9">idx on (monitor_id, checked_at DESC)</text>
  <text x="160" y="540" text-anchor="middle"
        fill="#374151" font-size="9">pool: 25 max · 5 idle · 5 min lifetime</text>

  <!-- ═════════════════════════════════ REDIS ══ -->
  <rect x="610" y="444" width="260" height="112" rx="8"
        fill="#240a0a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="470" text-anchor="middle"
        fill="#f87171" font-size="13" font-weight="600">Redis 7</text>
  <text x="740" y="490" text-anchor="middle"
        fill="#fca5a5" font-size="11">monitor:status:{id}</text>
  <text x="740" y="508" text-anchor="middle"
        fill="#7a2020" font-size="10">write-through cache · 5 min TTL</text>
  <text x="740" y="524" text-anchor="middle"
        fill="#4a1515" font-size="9">sub-ms reads · fallback to PG</text>
  <text x="740" y="540" text-anchor="middle"
        fill="#374151" font-size="9">expires if scheduler stops</text>

  <!-- ═══════════════════════════════ ARROWS TO DBs ══ -->

  <!-- Handler → PostgreSQL (dashed green, historical queries) -->
  <path d="M 310 198 C 310 415 160 415 160 444"
        fill="none" stroke="#16a34a" stroke-width="1.5"
        stroke-dasharray="6,3" marker-end="url(#ag)"/>
  <rect x="220" y="328" width="128" height="17" rx="3" fill="#0d1117"/>
  <text x="284" y="340" text-anchor="middle"
        fill="#16a34a" font-size="9">historical queries</text>

  <!-- Handler → Redis (dashed red, read live status) -->
  <path d="M 418 198 C 418 415 740 415 740 444"
        fill="none" stroke="#dc2626" stroke-width="1.5"
        stroke-dasharray="6,3" marker-end="url(#ar)"/>
  <rect x="545" y="328" width="100" height="17" rx="3" fill="#0d1117"/>
  <text x="595" y="340" text-anchor="middle"
        fill="#dc2626" font-size="9">read live status</text>

  <!-- Checker → PostgreSQL (solid green, INSERT check result) -->
  <path d="M 705 266 C 705 422 160 422 160 444"
        fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="365" y="403" width="110" height="17" rx="3" fill="#0d1117"/>
  <text x="420" y="415" text-anchor="middle"
        fill="#16a34a" font-size="9">INSERT check result</text>

  <!-- Checker → Redis (solid red, SET status cache) -->
  <line x1="750" y1="266" x2="750" y2="444"
        stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="756" y="345" width="90" height="17" rx="3" fill="#0d1117"/>
  <text x="801" y="357" text-anchor="middle"
        fill="#dc2626" font-size="9">SET status cache</text>

</svg>
